services:
  - type: web
    name: delegram-clients
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLATFORM_DATABASE_URL
        sync: false
      - key: CLIENTS_DATABASE_URL
        sync: false
